<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenProject</title>

    <!-- Material Symbols (icon font, loaded from CDN) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS (built locally via npm run build:css) -->
    <link rel="stylesheet" href="tailwind.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-surface-container-lowest text-on-surface font-body-base antialiased h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <nav class="flex flex-col h-screen fixed left-0 top-0 w-[260px] bg-surface-container-lowest border-r border-white/[0.04] z-40">

      <!-- Main Navigation -->
      <div class="flex flex-col gap-[2px] mt-4 px-3">
        <button id="new-chat-btn"
          class="flex items-center gap-3 px-2 py-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-white/[0.03] transition-all duration-200 cursor-pointer group w-full text-left">
          <span class="material-symbols-outlined text-[16px] opacity-70 group-hover:opacity-100 transition-opacity">add_comment</span>
          <span class="font-ui-label text-[12px] font-medium tracking-tight">New Chat</span>
        </button>
        <a class="flex items-center gap-3 px-2 py-1.5 rounded-md text-primary bg-white/[0.04] transition-all duration-200 cursor-pointer relative" href="#">
          <div class="absolute left-0 top-1/2 -translate-y-1/2 w-[2px] h-[14px] bg-primary rounded-r-full"></div>
          <span class="material-symbols-outlined text-[16px]">history</span>
          <span class="font-ui-label text-[12px] font-medium tracking-tight">History</span>
        </a>
        <a class="flex items-center gap-3 px-2 py-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-white/[0.03] transition-all duration-200 cursor-pointer group" href="#">
          <span class="material-symbols-outlined text-[16px] opacity-70 group-hover:opacity-100 transition-opacity">folder_shared</span>
          <span class="font-ui-label text-[12px] font-medium tracking-tight">Projects</span>
        </a>
        <a class="flex items-center gap-3 px-2 py-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-white/[0.03] transition-all duration-200 cursor-pointer group" href="#">
          <span class="material-symbols-outlined text-[16px] opacity-70 group-hover:opacity-100 transition-opacity">settings</span>
          <span class="font-ui-label text-[12px] font-medium tracking-tight">Settings</span>
        </a>
      </div>

      <!-- Chat History -->
      <div id="sidebar-history" class="mt-6 flex-1 overflow-y-auto pr-2 pl-3 custom-scrollbar">
        <p class="font-code-label text-[10px] text-on-surface-variant/30 px-2 mt-4">No history yet</p>
      </div>

      <!-- Footer Actions -->
      <div class="mt-auto pt-3 pb-4 border-t border-white/[0.04] flex flex-col gap-[2px] px-3">
        <a class="flex items-center gap-3 px-2 py-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-white/[0.03] transition-all duration-200 cursor-pointer group" href="#">
          <span class="material-symbols-outlined text-[16px] opacity-70 group-hover:opacity-100 transition-opacity">help</span>
          <span class="font-ui-label text-[12px] font-medium tracking-tight">Help</span>
        </a>
        <a class="flex items-center gap-3 px-2 py-1.5 rounded-md text-on-surface-variant hover:text-primary hover:bg-white/[0.03] transition-all duration-200 cursor-pointer group" href="#">
          <span class="material-symbols-outlined text-[16px] opacity-70 group-hover:opacity-100 transition-opacity">chat_bubble</span>
          <span class="font-ui-label text-[12px] font-medium tracking-tight">Feedback</span>
        </a>
      </div>
    </nav>

    <!-- Main Canvas -->
    <main class="flex-1 ml-[260px] flex flex-col h-screen relative bg-background">

      <!-- Header -->
      <header class="h-[48px] border-b border-white/5 shrink-0"></header>

      <!-- Chat Scroll Area -->
      <div id="chat" class="flex-1 overflow-y-auto px-lg pb-[140px] custom-scrollbar">
        <div id="messages" class="max-w-[800px] mx-auto flex flex-col gap-md py-md"></div>
      </div>

      <!-- Footer Input Area -->
      <div class="absolute bottom-0 left-0 w-full px-lg pb-lg bg-gradient-to-t from-background via-background/90 to-transparent pt-xl z-10 pointer-events-none">
        <div class="max-w-[800px] mx-auto pointer-events-auto">

          <form id="composer" class="bg-surface-container-high/80 backdrop-blur-xl border border-white/10 rounded-2xl p-xs flex flex-col gap-xs shadow-[0_8px_32px_rgba(0,0,0,0.25)]">
            <div id="pending-attachments" class="hidden flex flex-wrap gap-xs px-xs pt-xs"></div>
            <div class="flex items-center gap-xs">
              <button id="attach" type="button" title="Attach a file or folder"
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-on-surface-variant shrink-0 ml-1">
                <span class="material-symbols-outlined text-[20px]">add</span>
              </button>
              <textarea id="message" rows="1" placeholder="Ask about your projects…" autocomplete="off"
                class="flex-1 bg-transparent border-none outline-none font-body-base text-body-base text-primary placeholder:text-on-surface-variant/40 focus:ring-0 px-xs py-[9px] resize-none overflow-hidden max-h-[200px]"></textarea>
              <button type="submit"
                class="w-8 h-8 flex items-center justify-center rounded-full bg-secondary-container hover:opacity-90 transition-opacity text-primary shrink-0 mr-1">
                <span class="material-symbols-outlined text-[18px]">arrow_upward</span>
              </button>
            </div>
          </form>


        </div>
      </div>

    </main>

    <script src="renderer.js"></script>
  </body>
</html>
